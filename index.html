  <!DOCTYPE html>
<html>
<head>
<title>Lemonfield — Interactive Narrative Systems</title>

<style>
body {
  background: #f6f1df;
  font-family: Georgia, serif;
  text-align: center;
  margin: 0;
}

.hero {
  margin-top: 80px;
}

.tagline {
  opacity: 0.6;
  font-style: italic;
}

.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 20px;
  padding: 40px;
}

.card {
  background: #f0e6c8;
  padding: 30px;
  border-radius: 12px;
  transition: transform 0.3s ease;
}

.card:hover {
  transform: translateY(-5px);
}

canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}
</style>

</head>

<body>

<div class="hero">
  <h1>Lemonfield</h1>
  <p class="tagline">A place where systems have rates and words have breaths</p>
</div>

<div class="grid">
  <div class="card">Character & Behavior</div>
  <div class="card">Systems & Perception</div>
  <div class="card">Audio & Atmosphere</div>
  <div class="card">UI & Experience</div>
</div>

<canvas id="lemonCanvas"></canvas>

<script>
const canvas = document.getElementById("lemonCanvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

window.addEventListener("resize", () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

let t = 0;

function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  for(let i=0;i<200;i++){
    let angle = i * 0.1;
    let radius = 100 + Math.sin(t + i) * 20;

    let x = canvas.width/2 + radius * Math.cos(angle);
    let y = canvas.height/2 + radius * Math.sin(angle);

    ctx.fillStyle = "rgba(255, 220, 100, 0.6)";
    ctx.beginPath();
    ctx.arc(x, y, 2, 0, Math.PI*2);
    ctx.fill();
  }

  t += 0.02;
  requestAnimationFrame(draw);
}

draw();
</script>

</body>
